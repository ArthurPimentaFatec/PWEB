<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="container">
        <h1>Calculadora de Saúde</h1>
        
        <main class="card">
            <div class="input-group">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" placeholder="Ex: 70.5" step="0.1">
            </div>

            <div class="input-group">
                <label for="altura">Altura (m)</label>
                <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
            </div>

            <button id="btnIMC">Calcular IMC</button>

            <div class="result-container">
                <p id="res_imc">Aguardando dados...</p>
                <p class="sub-text" id="classificacao_imc"></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
