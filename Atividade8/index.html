<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa de Filme</title>
  <link rel="stylesheet" href="survey.css">
</head>
<body>
  <main>
    <div class="survey-panel">
      <h1>Pesquisa de Filme</h1>
      <form id="survey-form">
        <div class="field-group">
          <label for="campo-idade">Idade:</label>
          <input type="number" id="campo-idade" placeholder="Digite sua idade">
        </div>

        <div class="field-group">
          <label for="campo-genero">Gênero:</label>
          <select id="campo-genero">
            <option value="f">Feminino</option>
            <option value="m">Masculino</option>
            <option value="o">Outros</option>
          </select>
        </div>

        <div class="field-group">
          <label for="campo-avaliacao">Avaliação:</label>
          <select id="campo-avaliacao">
            <option value="1">1 - Péssimo</option>
            <option value="2">2 - Regular</option>
            <option value="3">3 - Bom</option>
            <option value="4">4 - Ótimo</option>
          </select>
        </div>

        <div class="btn-group">
          <button type="button" id="btn-registrar">Registrar</button>
          <button type="button" id="btn-consultar">Consultar</button>
        </div>
      </form>
    </div>
  </main>
  <script src="survey.js"></script>
</body>
</html>
