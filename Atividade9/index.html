<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Atividade 9</h1>

        <!-- Função 1 -->
        <section class="card">
            <h3>Descubra o maior número</h3>
            <div class="grid">
                <input type="number" id="input1" placeholder="N1">
                <input type="number" id="input2" placeholder="N2">
                <input type="number" id="input3" placeholder="N3">
            </div>
            <button id="botao1">Verificar Maior</button>
            <p id="result1" class="result">O resultado aparecerá aqui.</p>
        </section>

        <!-- Função 2 -->
        <section class="card">
            <h3>Ordenar Números (Crescente)</h3>
            <div class="grid">
                <input type="number" id="num1" placeholder="N1">
                <input type="number" id="num2" placeholder="N2">
                <input type="number" id="num3" placeholder="N3">
            </div>
            <button id="btnOrdenar">Ordenar</button>
            <p id="resultado" class="result">Os números ordenados aparecerão aqui.</p>
        </section>

        <!-- Função 3 -->
        <section class="card">
            <h3>Verificador de Palíndromo</h3>
            <input type="text" id="palavraInput" placeholder="Digite uma palavra">
            <button id="btnVerificar">Verificar</button>
            <p id="res_palindromo" class="result">O resultado aparecerá aqui.</p>
        </section>

        <!-- Função 4 -->
        <section class="card">
            <h3>Verificador de Subconjunto</h3>
            <div class="grid">
                <input type="text" id="p1" placeholder="Palavra 1">
                <input type="text" id="p2" placeholder="Palavra 2">
            </div>
            <button id="btnVerificarSub">Verificar</button>
            <p id="res_subconjunto" class="result">O resultado aparecerá aqui.</p>
        </section>

        <!-- Função 5 -->
        <section class="card">
            <h3>Descobrir o Dia da Semana</h3>
            <input type="date" id="dataInput">
            <button id="btnData">Verificar Dia</button>
            <p id="res_data" class="result">Escolha uma data.</p>
        </section>
    </main>

    <!-- Scripts no final para garantir que o DOM carregou -->
    <script src="funcao-1.js"></script>
    <script src="funcao-2.js"></script>
    <script src="funcao-3.js"></script>
    <script src="funcao-4.js"></script>
    <script src="funcao-5.js"></script>
</body>
</html>
