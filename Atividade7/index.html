<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedra, Papel ou Tesoura</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <div class="game-wrapper">
    <h1 class="game-title">Pedra, Papel ou Tesoura</h1>
    <p class="game-subtitle">Escolha sua jogada</p>
    <div class="game-board">
      <div class="choice-card" data-choice="pedra" title="Pedra">
        <button class="card-btn" aria-label="Jogar Pedra"></button>
      </div>
      <div class="choice-card" data-choice="papel" title="Papel">
        <button class="card-btn" aria-label="Jogar Papel"></button>
      </div>
      <div class="choice-card" data-choice="tesoura" title="Tesoura">
        <button class="card-btn" aria-label="Jogar Tesoura"></button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
